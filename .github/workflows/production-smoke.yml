name: PersonaFlow Production Smoke

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: "Vercel Production URL，例如 https://example.vercel.app"
        required: true
        type: string
      api_url:
        description: "Render API URL，不要包含 /api/health"
        required: true
        type: string
      expected_version:
        description: "预期应用版本"
        required: true
        default: "0.4.3"
        type: string

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Validate deployed frontend and API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCTION_FRONTEND_URL: ${{ inputs.frontend_url }}
      PRODUCTION_API_URL: ${{ inputs.api_url }}
      EXPECTED_APP_VERSION: ${{ inputs.expected_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f scripts/normalize-package-lock-registry.cjs ]; then
            node scripts/normalize-package-lock-registry.cjs
          fi
          npm ci --registry=https://registry.npmjs.org/ --replace-registry-host=always

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Validate production API health
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          base = os.environ["PRODUCTION_API_URL"].rstrip("/")
          expected = os.environ["EXPECTED_APP_VERSION"]
          url = f"{base}/api/health"
          last_error = None

          for attempt in range(12):
              try:
                  with urllib.request.urlopen(url, timeout=20) as response:
                      payload = json.load(response)
                  break
              except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
                  last_error = exc
                  if attempt == 11:
                      raise SystemExit(f"生产 API 健康检查失败：{exc}")
                  time.sleep(10)
          else:
              raise SystemExit(f"生产 API 健康检查失败：{last_error}")

          if payload.get("app_version") != expected:
              raise SystemExit(
                  f"生产 API 版本不一致：expected={expected}, actual={payload.get('app_version')}"
              )
          if str(payload.get("api_schema_version")) != "1":
              raise SystemExit(
                  f"API schema 不兼容：expected=1, actual={payload.get('api_schema_version')}"
              )
          if not payload.get("git_commit"):
              raise SystemExit("生产 API 健康接口缺少 git_commit")

          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Run production browser smoke
        working-directory: frontend
        shell: bash
        run: |
          mkdir -p ../production-smoke-artifacts
          node --input-type=module <<'NODE'
          import { chromium } from "@playwright/test";
          import fs from "node:fs";

          const base = process.env.PRODUCTION_FRONTEND_URL.replace(/\/$/, "");
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({ viewport: { width: 1440, height: 900 } });
          const page = await context.newPage();
          const consoleErrors = [];
          const pageErrors = [];

          page.on("console", (message) => {
            if (message.type() === "error") consoleErrors.push(message.text());
          });
          page.on("pageerror", (error) => pageErrors.push(String(error)));

          const routes = [
            ["advisor", "/#/today"],
            ["manager", "/#/manager/radar"],
            ["operations", "/#/ops/hotspots"],
            ["conversation", "/#/followup?customer=customer-chen"],
          ];

          for (const [name, route] of routes) {
            const response = await page.goto(`${base}${route}`, {
              waitUntil: "networkidle",
              timeout: 60000,
            });
            if (response && !response.ok()) {
              throw new Error(`${name} 页面返回 HTTP ${response.status()}`);
            }
            await page.waitForTimeout(800);
            const bodyText = (await page.locator("body").innerText()).trim();
            if (!bodyText) throw new Error(`${name} 页面为空`);
            await page.screenshot({
              path: `../production-smoke-artifacts/${name}-1440.png`,
              fullPage: true,
            });
          }

          const collapse = page.locator(
            '[data-testid="sidebar-collapse"], [aria-label*="收起"], [aria-label*="折叠"]'
          ).first();
          if (await collapse.isVisible().catch(() => false)) {
            await collapse.click();
            await page.waitForTimeout(300);
            await page.screenshot({
              path: "../production-smoke-artifacts/sidebar-collapsed-1440.png",
              fullPage: true,
            });
          }

          fs.writeFileSync(
            "../production-smoke-artifacts/console-errors.json",
            JSON.stringify({ consoleErrors, pageErrors }, null, 2)
          );

          await browser.close();

          if (pageErrors.length > 0) {
            throw new Error(`生产页面存在 page error：${pageErrors.join(" | ")}`);
          }
          if (consoleErrors.length > 0) {
            throw new Error(`生产页面存在 console error：${consoleErrors.join(" | ")}`);
          }
          NODE

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-${{ github.run_id }}
          path: production-smoke-artifacts
          if-no-files-found: ignore
          retention-days: 14
