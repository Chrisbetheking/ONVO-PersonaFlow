name: PersonaFlow Production Smoke

on:
  workflow_dispatch:
  deployment_status:

jobs:
  smoke:
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success') &&
      vars.PRODUCTION_WEB_URL != '' && vars.PRODUCTION_API_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCTION_WEB_URL: ${{ vars.PRODUCTION_WEB_URL }}
      PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      PRODUCTION_EXPECTED_COMMIT: ${{ github.event.deployment.sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run production smoke
        working-directory: frontend
        run: npm run test:smoke

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-${{ github.run_id }}
          path: |
            frontend/playwright-report/production-smoke
            frontend/test-results/production-smoke
          if-no-files-found: ignore
          retention-days: 14
