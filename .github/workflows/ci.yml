name: PersonaFlow CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Compile and test backend
        working-directory: backend
        run: |
          PYTHONPATH=. python3 -m compileall -q app
          PYTHONPATH=. python3 -m pytest -q

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Audit frontend dependencies
        if: always()
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build frontend
        if: always()
        working-directory: frontend
        run: npm run build

      - name: Verify release integrity
        if: always()
        run: python3 scripts/release_integrity.py
