services:
  - type: web
    name: onvo-personaflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: WORKSPACE_TTL_SECONDS
        value: 21600
      - key: WORKSPACE_CLEANUP_INTERVAL_SECONDS
        value: 300
      - key: MAX_WORKSPACES
        value: 5000
      - key: LLM_PROVIDER_MODE
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_THINKING
        value: disabled
      - key: CORS_ORIGINS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
