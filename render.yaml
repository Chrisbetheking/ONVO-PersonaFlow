services:
  - type: web
    name: onvo-personaflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: LLM_PROVIDER_MODE
        value: demo
      - key: CORS_ORIGINS
        sync: false
